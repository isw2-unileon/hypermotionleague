version: 2
updates:
  # Go modules at repo root (single module covers backend/).
  # Minor + patch are batched into one PR; majors are not opened automatically
  # (Go major bumps change the import path and need a deliberate manual upgrade).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Frontend npm. Majors are held deliberately (vite 6, typescript 5.7, eslint 9,
  # globals 15 are pinned on purpose) so they are not auto-opened; do those as
  # planned manual upgrades.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # vue-router >= 5.1.0 requires a vite ^7 || ^8 peer, but vite is held at
      # ^6 on purpose. Hold vue-router on the vite-6-compatible 5.0.x line
      # (patches still flow); unblock this when we do the deliberate vite 6->8
      # upgrade.
      - dependency-name: "vue-router"
        update-types: ["version-update:semver-minor", "version-update:semver-major"]

  # E2E npm. Same policy as frontend: hold majors (e.g. typescript 6), batch the rest.
  - package-ecosystem: npm
    directory: "/e2e"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      e2e-minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions. Minor + patch are grouped. Majors are intentionally left
  # flowing (NOT ignored): action majors are low-risk and infrequent, and we
  # want them visible for a quick human merge rather than silently held.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        update-types: ["minor", "patch"]
