version: 2
updates:
  # Go modules at repo root (single module covers backend/)
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      frontend-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/e2e"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      e2e-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
