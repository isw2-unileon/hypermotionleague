name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/backend.yml"
  pull_request:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-test-secret-not-real
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hypermotion_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download && go mod verify

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.9

      - name: Test
        run: go test -v -race ./...

      - name: Build
        run: go build -o /dev/null ./backend/cmd/server
