name: E2E

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The backend reads JWT_SECRET on boot (config.Load fails fast if empty)
    # and connects to Postgres for every handler. Both must be present.
    env:
      JWT_SECRET: ci-e2e-secret-not-real
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/hypermotion_test?sslmode=disable
      PORT: "8080"
      GIN_MODE: release

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hypermotion_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      # Apply migrations against the service container before booting
      # the server. psql is preinstalled on ubuntu-latest runners.
      - name: Apply migrations
        run: |
          for f in backend/db/migrations/*.up.sql; do
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Install frontend deps and build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install E2E deps
        working-directory: e2e
        run: npm ci

      # Only install chromium — the workflow only runs chromium below.
      - name: Install Playwright (chromium only)
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # Playwright's config has its own webServer block — let it manage
      # backend + frontend startup. The previous workflow's manual
      # `go run ... &` + curl loop raced against the Playwright config.
      - name: Run Playwright
        working-directory: e2e
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report
          retention-days: 7
