version: "2"

run:
  timeout: 5m

# Baseline relaxed to bug-catching / correctness / security linters.
# Style, duplication and complexity linters (revive, dupl, gocritic, gocyclo,
# gocognit, funlen, misspell, unconvert, unparam, nolintlint) were dropped on
# purpose: the strict set had gone unmaintained and red for weeks, drowning
# real findings. Re-introduce them deliberately if the team wants them back.
linters:
  enable:
    # Error handling
    - errcheck
    - errorlint

    # Bug catchers
    - staticcheck
    - govet
    - ineffassign
    - unused

    # Security
    - gosec

  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - path: "_test\\.go$"
        linters:
          - gosec

issues:
  max-same-issues: 0
  max-issues-per-linter: 0
